# Import secrets from local .env file 
spring.config.import=optional:file:.env[.properties]

spring.application.name=nanourl
server.port=8080

# PostgreSQL (production database)
spring.config.activate.on-profile=prod
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shortener}
spring.datasource.username=${DB_USER:shortener}
spring.datasource.password=${DB_PASSWORD:secret}
spring.jpa.hibernate.ddl-auto=validate